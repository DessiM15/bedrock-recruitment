<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B2412"/>
      <stop offset="60%" stop-color="#143A20"/>
      <stop offset="100%" stop-color="#1A4D2A"/>
    </linearGradient>
    <linearGradient id="mountain1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A38D6D"/>
      <stop offset="100%" stop-color="#8A7558"/>
    </linearGradient>
    <linearGradient id="mountain2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B2412"/>
      <stop offset="100%" stop-color="#0D2E16"/>
    </linearGradient>
    <linearGradient id="mountain3" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#8A7558"/>
      <stop offset="100%" stop-color="#6B5A43"/>
    </linearGradient>
    <linearGradient id="foreground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B2412" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0B2412"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.35" r="0.5">
      <stop offset="0%" stop-color="#A38D6D" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#A38D6D" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="1920" height="1080" fill="url(#sky)"/>

  <!-- Subtle radial glow -->
  <rect width="1920" height="1080" fill="url(#glow)"/>

  <!-- Distant mountain range - far back -->
  <polygon points="0,650 180,420 360,500 540,380 720,460 900,350 1080,430 1260,370 1440,450 1620,390 1800,440 1920,480 1920,750 0,750" fill="#163D22" opacity="0.6"/>

  <!-- Large rock formation left - Bedrock evocation -->
  <polygon points="0,750 100,500 250,380 400,320 500,360 600,420 650,500 700,480 750,520 700,600 600,650 500,680 350,700 200,720 0,750" fill="url(#mountain1)" opacity="0.85"/>

  <!-- Central peak -->
  <polygon points="700,750 850,450 960,300 1060,280 1160,320 1250,400 1300,500 1350,480 1400,520 1350,600 1200,680 1050,720 900,740 700,750" fill="url(#mountain2)" opacity="0.9"/>

  <!-- Right formation -->
  <polygon points="1300,750 1400,520 1500,400 1600,360 1700,380 1800,420 1920,500 1920,750 1300,750" fill="url(#mountain3)" opacity="0.8"/>

  <!-- Mid-ground ridge -->
  <polygon points="0,800 200,700 400,720 600,680 800,700 1000,670 1200,690 1400,660 1600,700 1800,680 1920,720 1920,800 0,800" fill="#0D2E16" opacity="0.85"/>

  <!-- Stone texture accents - geometric facets on left formation -->
  <polygon points="250,380 350,400 300,460 200,440" fill="#B8A07E" opacity="0.2"/>
  <polygon points="350,400 500,360 480,440 350,460" fill="#0B2412" opacity="0.15"/>
  <polygon points="400,320 500,360 450,400 350,380" fill="#C4AD8A" opacity="0.1"/>

  <!-- Geometric facets on central peak -->
  <polygon points="960,300 1060,280 1040,360 960,370" fill="#A38D6D" opacity="0.12"/>
  <polygon points="1060,280 1160,320 1120,400 1040,360" fill="#1A4D2A" opacity="0.2"/>
  <polygon points="960,370 1040,360 1020,440 950,430" fill="#A38D6D" opacity="0.08"/>

  <!-- Foreground dark overlay -->
  <rect y="780" width="1920" height="300" fill="url(#foreground)"/>

  <!-- Subtle horizontal lines suggesting geological strata -->
  <line x1="0" y1="700" x2="1920" y2="690" stroke="#A38D6D" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="730" x2="1920" y2="725" stroke="#A38D6D" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="760" x2="1920" y2="758" stroke="#A38D6D" stroke-width="0.3" opacity="0.05"/>

  <!-- Decorative geometric overlay - diamond shapes -->
  <polygon points="960,200 1010,260 960,320 910,260" fill="none" stroke="#A38D6D" stroke-width="0.8" opacity="0.1"/>
  <polygon points="960,220 990,260 960,300 930,260" fill="none" stroke="#A38D6D" stroke-width="0.5" opacity="0.08"/>

  <!-- Subtle dot pattern in sky area -->
  <circle cx="300" cy="150" r="1.5" fill="#FFFDF7" opacity="0.08"/>
  <circle cx="600" cy="100" r="1" fill="#FFFDF7" opacity="0.06"/>
  <circle cx="900" cy="180" r="1.2" fill="#FFFDF7" opacity="0.07"/>
  <circle cx="1200" cy="120" r="1" fill="#FFFDF7" opacity="0.05"/>
  <circle cx="1500" cy="160" r="1.3" fill="#FFFDF7" opacity="0.06"/>
  <circle cx="1700" cy="90" r="1" fill="#FFFDF7" opacity="0.05"/>
  <circle cx="450" cy="200" r="0.8" fill="#FFFDF7" opacity="0.04"/>
  <circle cx="1350" cy="220" r="0.8" fill="#FFFDF7" opacity="0.04"/>
</svg>