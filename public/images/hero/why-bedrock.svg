<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <linearGradient id="bg-warm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFDF7"/>
      <stop offset="100%" stop-color="#F5EDE0"/>
    </linearGradient>
    <linearGradient id="desk-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A38D6D"/>
      <stop offset="100%" stop-color="#8A7558"/>
    </linearGradient>
    <linearGradient id="wall-accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B2412" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0B2412" stop-opacity="0.02"/>
    </linearGradient>
    <clipPath id="frame-clip">
      <rect x="50" y="50" width="700" height="900" rx="8"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="1000" fill="url(#bg-warm)" rx="8"/>

  <!-- Subtle wall pattern -->
  <rect x="0" y="0" width="800" height="500" fill="url(#wall-accent)"/>

  <!-- Wall art / window frame -->
  <rect x="280" y="100" width="240" height="160" rx="4" fill="none" stroke="#A38D6D" stroke-width="2" opacity="0.3"/>
  <rect x="290" y="110" width="220" height="140" rx="2" fill="#0B2412" opacity="0.06"/>
  <!-- Simple landscape in frame -->
  <polygon points="290,250 350,180 410,210 470,170 510,200 510,250" fill="#0B2412" opacity="0.08"/>
  <circle cx="460" cy="140" r="15" fill="#A38D6D" opacity="0.15"/>

  <!-- Conference table -->
  <ellipse cx="400" cy="620" rx="300" ry="60" fill="url(#desk-grad)" opacity="0.25"/>
  <rect x="120" y="580" width="560" height="10" rx="5" fill="#A38D6D" opacity="0.4"/>

  <!-- Person 1 - Standing left, presenting -->
  <g transform="translate(150, 280)">
    <!-- Body -->
    <rect x="15" y="80" width="50" height="120" rx="8" fill="#0B2412" opacity="0.7"/>
    <!-- Head -->
    <circle cx="40" cy="55" r="30" fill="#A38D6D" opacity="0.5"/>
    <!-- Arm raised -->
    <line x1="65" y1="100" x2="100" y2="70" stroke="#0B2412" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
    <!-- Legs -->
    <line x1="30" y1="200" x2="25" y2="270" stroke="#0B2412" stroke-width="7" stroke-linecap="round" opacity="0.6"/>
    <line x1="50" y1="200" x2="55" y2="270" stroke="#0B2412" stroke-width="7" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Person 2 - Seated center-left -->
  <g transform="translate(300, 380)">
    <!-- Chair back -->
    <rect x="0" y="20" width="60" height="80" rx="6" fill="#A38D6D" opacity="0.2"/>
    <!-- Body -->
    <rect x="8" y="40" width="44" height="80" rx="6" fill="#0B2412" opacity="0.55"/>
    <!-- Head -->
    <circle cx="30" cy="18" r="24" fill="#A38D6D" opacity="0.45"/>
    <!-- Arms on table -->
    <line x1="8" y1="80" x2="-15" y2="95" stroke="#0B2412" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
    <line x1="52" y1="80" x2="75" y2="95" stroke="#0B2412" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Person 3 - Seated center-right -->
  <g transform="translate(460, 370)">
    <!-- Chair back -->
    <rect x="0" y="20" width="60" height="80" rx="6" fill="#A38D6D" opacity="0.2"/>
    <!-- Body -->
    <rect x="8" y="40" width="44" height="80" rx="6" fill="#0B2412" opacity="0.5"/>
    <!-- Head -->
    <circle cx="30" cy="18" r="24" fill="#A38D6D" opacity="0.42"/>
    <!-- Arm gesture -->
    <line x1="52" y1="70" x2="80" y2="55" stroke="#0B2412" stroke-width="5" stroke-linecap="round" opacity="0.45"/>
  </g>

  <!-- Person 4 - Seated right -->
  <g transform="translate(590, 390)">
    <!-- Chair back -->
    <rect x="0" y="20" width="55" height="75" rx="6" fill="#A38D6D" opacity="0.2"/>
    <!-- Body -->
    <rect x="6" y="38" width="42" height="75" rx="6" fill="#0B2412" opacity="0.45"/>
    <!-- Head -->
    <circle cx="27" cy="16" r="22" fill="#A38D6D" opacity="0.4"/>
  </g>

  <!-- Laptop/documents on table -->
  <rect x="320" y="555" width="50" height="30" rx="3" fill="#0B2412" opacity="0.15" transform="rotate(-5, 345, 570)"/>
  <rect x="440" y="558" width="40" height="25" rx="2" fill="#A38D6D" opacity="0.15"/>
  <rect x="230" y="560" width="35" height="22" rx="2" fill="#0B2412" opacity="0.1"/>

  <!-- Floor area -->
  <rect x="0" y="700" width="800" height="300" fill="#0B2412" opacity="0.04"/>

  <!-- Decorative elements - subtle geometric shapes -->
  <circle cx="680" cy="150" r="40" fill="none" stroke="#A38D6D" stroke-width="1" opacity="0.15"/>
  <circle cx="680" cy="150" r="25" fill="none" stroke="#A38D6D" stroke-width="0.8" opacity="0.1"/>

  <!-- Plant in corner -->
  <g transform="translate(680, 500)">
    <rect x="5" y="60" width="30" height="40" rx="3" fill="#A38D6D" opacity="0.3"/>
    <ellipse cx="20" cy="40" rx="30" ry="35" fill="#0B2412" opacity="0.15"/>
    <ellipse cx="15" cy="30" rx="18" ry="25" fill="#0B2412" opacity="0.12"/>
    <ellipse cx="28" cy="35" rx="20" ry="28" fill="#0B2412" opacity="0.1"/>
  </g>

  <!-- Warm light effect -->
  <ellipse cx="400" cy="300" rx="350" ry="250" fill="#A38D6D" opacity="0.03"/>

  <!-- Bottom decorative bar -->
  <rect x="100" y="920" width="600" height="2" fill="#A38D6D" opacity="0.15"/>
  <rect x="200" y="930" width="400" height="1" fill="#A38D6D" opacity="0.1"/>
</svg>