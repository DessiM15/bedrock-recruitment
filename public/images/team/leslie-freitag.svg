<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="lf-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B2412"/>
      <stop offset="100%" stop-color="#163D22"/>
    </linearGradient>
    <linearGradient id="lf-ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A38D6D"/>
      <stop offset="50%" stop-color="#C4AD8A"/>
      <stop offset="100%" stop-color="#A38D6D"/>
    </linearGradient>
    <radialGradient id="lf-glow" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#A38D6D" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#A38D6D" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="url(#lf-bg)"/>

  <!-- Subtle glow -->
  <circle cx="200" cy="180" r="200" fill="url(#lf-glow)"/>

  <!-- Decorative outer ring -->
  <circle cx="200" cy="200" r="185" fill="none" stroke="url(#lf-ring)" stroke-width="1.5" opacity="0.4"/>
  <circle cx="200" cy="200" r="175" fill="none" stroke="#A38D6D" stroke-width="0.5" opacity="0.2"/>

  <!-- Subtle geometric accent - top -->
  <line x1="140" y1="80" x2="260" y2="80" stroke="#A38D6D" stroke-width="0.8" opacity="0.15"/>
  <polygon points="200,65 210,80 190,80" fill="#A38D6D" opacity="0.12"/>

  <!-- Silhouette shoulders -->
  <ellipse cx="200" cy="380" rx="120" ry="80" fill="#A38D6D" opacity="0.08"/>

  <!-- Initials -->
  <text x="200" y="215" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="88" font-weight="400" fill="#A38D6D" letter-spacing="8" opacity="0.85">LF</text>

  <!-- Subtle underline beneath initials -->
  <line x1="130" y1="240" x2="270" y2="240" stroke="#A38D6D" stroke-width="1" opacity="0.25"/>

  <!-- Corner accents -->
  <path d="M 60 60 L 60 90" stroke="#A38D6D" stroke-width="1" opacity="0.15" stroke-linecap="round"/>
  <path d="M 60 60 L 90 60" stroke="#A38D6D" stroke-width="1" opacity="0.15" stroke-linecap="round"/>
  <path d="M 340 340 L 340 310" stroke="#A38D6D" stroke-width="1" opacity="0.15" stroke-linecap="round"/>
  <path d="M 340 340 L 310 340" stroke="#A38D6D" stroke-width="1" opacity="0.15" stroke-linecap="round"/>

  <!-- Small decorative diamond -->
  <polygon points="200,290 208,300 200,310 192,300" fill="none" stroke="#A38D6D" stroke-width="0.8" opacity="0.2"/>
</svg>