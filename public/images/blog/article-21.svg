<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg-grad-21" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8A7558"/>
      <stop offset="100%" stop-color="#997F5F"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="8" fill="url(#bg-grad-21)"/>

  <!-- Pattern decoration -->
  <polygon points="600,50 750,250 450,250" fill="none" stroke="#163D22" stroke-width="1.5" opacity="0.1"/>
      <polygon points="600,90 720,240 480,240" fill="#163D22" opacity="0.04"/>
      <polygon points="200,300 300,450 100,450" fill="none" stroke="#163D22" stroke-width="1" opacity="0.08"/>
      <polygon points="500,350 560,450 440,450" fill="none" stroke="#163D22" stroke-width="0.8" opacity="0.06"/>

  <!-- Article number label -->
  <text x="400" y="235" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="400" fill="#0B2412" letter-spacing="4" opacity="0.15">21</text>

  <!-- Decorative line -->
  <line x1="320" y1="260" x2="480" y2="260" stroke="#163D22" stroke-width="1.5" opacity="0.3"/>

  <!-- "Article" label -->
  <text x="400" y="290" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="16" fill="#0B2412" letter-spacing="6" opacity="0.35">ARTICLE</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="488" width="800" height="12" rx="0 0 8 8" fill="#163D22" opacity="0.15"/>
</svg>
