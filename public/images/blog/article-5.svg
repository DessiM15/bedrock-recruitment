  <!-- Article number label -->
  <text x="400" y="235" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="400" fill="#FFFDF7" letter-spacing="4" opacity="0.15">5</text>

  <!-- Decorative line -->
