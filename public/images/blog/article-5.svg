<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg-grad-5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#133D1F"/>
      <stop offset="100%" stop-color="#143A20"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="8" fill="url(#bg-grad-5)"/>

  <!-- Pattern decoration -->
