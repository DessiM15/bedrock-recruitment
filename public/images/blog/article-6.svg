<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg-grad-6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#153F22"/>
      <stop offset="100%" stop-color="#1A4D2A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="8" fill="url(#bg-grad-6)"/>

  <!-- Pattern decoration -->
  <polygon points="400,80 480,170 400,260 320,170" fill="none" stroke="#B8A07E" stroke-width="1.5" opacity="0.1"/>
      <polygon points="400,110 450,170 400,230 350,170" fill="#B8A07E" opacity="0.05"/>
      <polygon points="650,300 700,350 650,400 600,350" fill="none" stroke="#B8A07E" stroke-width="1" opacity="0.08"/>
      <polygon points="150,350 200,400 150,450 100,400" fill="none" stroke="#B8A07E" stroke-width="1" opacity="0.08"/>

  <!-- Article number label -->
  <text x="400" y="235" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="400" fill="#FFFDF7" letter-spacing="4" opacity="0.15">6</text>

  <!-- Decorative line -->
  <line x1="320" y1="260" x2="480" y2="260" stroke="#B8A07E" stroke-width="1.5" opacity="0.3"/>

  <!-- "Article" label -->
  <text x="400" y="290" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="16" fill="#FFFDF7" letter-spacing="6" opacity="0.35">ARTICLE</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="488" width="800" height="12" rx="0 0 8 8" fill="#B8A07E" opacity="0.15"/>
</svg>
