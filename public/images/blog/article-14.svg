<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg-grad-14" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D2E16"/>
      <stop offset="100%" stop-color="#163D22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="8" fill="url(#bg-grad-14)"/>

  <!-- Pattern decoration -->
  <circle cx="650" cy="120" r="120" fill="none" stroke="#A38D6D" stroke-width="2" opacity="0.12"/>
      <circle cx="650" cy="120" r="80" fill="none" stroke="#A38D6D" stroke-width="1.5" opacity="0.1"/>
      <circle cx="650" cy="120" r="40" fill="#A38D6D" opacity="0.06"/>
      <circle cx="150" cy="400" r="90" fill="none" stroke="#A38D6D" stroke-width="1.5" opacity="0.08"/>

  <!-- Article number label -->
  <text x="400" y="235" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="400" fill="#FFFDF7" letter-spacing="4" opacity="0.15">14</text>

  <!-- Decorative line -->
