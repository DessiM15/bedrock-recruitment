<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg-grad-16" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#11381C"/>
      <stop offset="100%" stop-color="#1E5730"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="8" fill="url(#bg-grad-16)"/>

  <!-- Pattern decoration -->
  <line x1="200" y1="0" x2="200" y2="500" stroke="#937A54" stroke-width="0.5" opacity="0.08"/>
      <line x1="400" y1="0" x2="400" y2="500" stroke="#937A54" stroke-width="0.5" opacity="0.08"/>
      <line x1="600" y1="0" x2="600" y2="500" stroke="#937A54" stroke-width="0.5" opacity="0.08"/>
      <line x1="0" y1="125" x2="800" y2="125" stroke="#937A54" stroke-width="0.5" opacity="0.08"/>
      <line x1="0" y1="250" x2="800" y2="250" stroke="#937A54" stroke-width="0.5" opacity="0.08"/>
      <line x1="0" y1="375" x2="800" y2="375" stroke="#937A54" stroke-width="0.5" opacity="0.08"/>
      <rect x="200" y="125" width="200" height="125" fill="#937A54" opacity="0.04"/>
      <rect x="400" y="250" width="200" height="125" fill="#937A54" opacity="0.04"/>

  <!-- Article number label -->
  <text x="400" y="235" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="400" fill="#FFFDF7" letter-spacing="4" opacity="0.15">16</text>

  <!-- Decorative line -->
  <line x1="320" y1="260" x2="480" y2="260" stroke="#937A54" stroke-width="1.5" opacity="0.3"/>

  <!-- "Article" label -->
  <text x="400" y="290" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="16" fill="#FFFDF7" letter-spacing="6" opacity="0.35">ARTICLE</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="488" width="800" height="12" rx="0 0 8 8" fill="#937A54" opacity="0.15"/>
</svg>
