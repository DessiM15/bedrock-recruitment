      <stop offset="0%" stop-color="#0F3319"/>
      <stop offset="100%" stop-color="#0B2412"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="8" fill="url(#bg-grad-15)"/>

  <!-- Pattern decoration -->
  <polygon points="0,500 200,280 400,350 600,250 800,320 800,500" fill="#B8A07E" opacity="0.08"/>
      <polygon points="0,500 150,320 350,380 550,300 800,370 800,500" fill="#B8A07E" opacity="0.06"/>
      <polygon points="0,500 100,400 300,430 500,380 700,410 800,500" fill="#B8A07E" opacity="0.04"/>

  <!-- Article number label -->
  <text x="400" y="235" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="400" fill="#FFFDF7" letter-spacing="4" opacity="0.15">15</text>

