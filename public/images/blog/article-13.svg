<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg-grad-13" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B2412"/>
      <stop offset="100%" stop-color="#1A4D2A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="8" fill="url(#bg-grad-13)"/>

  <!-- Pattern decoration -->
  <line x1="0" y1="500" x2="800" y2="0" stroke="#C4AD8A" stroke-width="40" opacity="0.08"/>
      <line x1="100" y1="500" x2="800" y2="50" stroke="#C4AD8A" stroke-width="25" opacity="0.06"/>
      <line x1="-100" y1="500" x2="700" y2="0" stroke="#C4AD8A" stroke-width="15" opacity="0.05"/>
      <line x1="200" y1="500" x2="800" y2="100" stroke="#C4AD8A" stroke-width="8" opacity="0.04"/>

  <!-- Article number label -->
  <text x="400" y="235" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="400" fill="#FFFDF7" letter-spacing="4" opacity="0.15">13</text>

  <!-- Decorative line -->
  <line x1="320" y1="260" x2="480" y2="260" stroke="#C4AD8A" stroke-width="1.5" opacity="0.3"/>

  <!-- "Article" label -->
  <text x="400" y="290" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="16" fill="#FFFDF7" letter-spacing="6" opacity="0.35">ARTICLE</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="488" width="800" height="12" rx="0 0 8 8" fill="#C4AD8A" opacity="0.15"/>
</svg>
